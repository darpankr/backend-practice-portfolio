name: Java CI/CD with Maven

on:
  push:
    branches: master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn clean test -Dspring.profiles.active=profile
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Analyze with SonarCloud
        run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: DEBUG - Check env vars exist
        run: |
          if [ -z "$DB_URL" ]; then
            echo "❌ DB_URL is NOT set"
          else
            echo "✅ DB_URL is set"
          fi
          if [ -z "$DB_USERNAME" ]; then
            echo "❌ DB_USERNAME is NOT set"
          else
            echo "✅ DB_USERNAME is set"
          fi
          env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}

      - name: Build Package
        run: mvn clean package -DskipTests -Dspring.profiles.active=prod
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}