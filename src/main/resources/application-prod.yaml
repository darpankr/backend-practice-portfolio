
spring:
  datasource:
    url: {{ secrets.DB_URL }}
    username: {{ secrets.DB_USERNAME }}
    password: {{ secrets.DB_PASSWORD }}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

